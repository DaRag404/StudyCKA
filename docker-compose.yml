services:

  # ── Build the sandbox image so the backend can create containers from it ────
  # This service exits immediately; its only purpose is to produce the image.
  sandbox-build:
    build:
      context: ./sandbox
    image: studycka-sandbox:latest
    entrypoint: ["true"]

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: studycka-backend:latest
    restart: unless-stopped
    depends_on:
      sandbox-build:
        condition: service_completed_successfully
    environment:
      - PORT=3000
      - SANDBOX_IMAGE=studycka-sandbox:latest
      # On Linux: /var/run/docker.sock
      # On Windows Docker Desktop + WSL2: also /var/run/docker.sock
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      # Mount Docker socket so backend can manage sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount exercises directory so they can be updated without rebuild
      - ./exercises:/app/exercises:ro
    expose:
      - "3000"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: studycka-frontend:latest
    restart: unless-stopped
    expose:
      - "5173"

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
