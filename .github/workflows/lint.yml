name: Lint

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json
      - run: npm install
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  auto-merge:
    name: Create PR and auto-merge
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create PR if not exists
        run: |
          TITLE=$(git log -1 --format='%s')
          BODY=$(git log -1 --format='%b')
          gh pr create \
            --base master \
            --head "${{ github.ref_name }}" \
            --title "$TITLE" \
            --body "$BODY" \
          || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
