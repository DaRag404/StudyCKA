name: Lint

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json
      - run: npm install
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
