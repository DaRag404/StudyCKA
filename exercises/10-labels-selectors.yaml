id: "10"
title: "Labels and Selectors"
difficulty: "easy"
category: "Core Concepts"
order: 10
description: |
  A Deployment named `web` already exists. Add the label `tier=frontend` to it.
  Then create a second Deployment named `api` with label `tier=backend`.

  ```
  kubectl get deployments --show-labels
  kubectl get pods -l tier=frontend
  ```
hints:
  - "Add a label imperatively: `kubectl label deployment web tier=frontend`"
  - "Create the api deployment: `kubectl create deployment api --image=nginx:1.25`"
  - "Label it: `kubectl label deployment api tier=backend`"
  - "Filter by label: `kubectl get pods -l tier=backend`"
validation:
  - args: ["get", "deploy", "web", "-o", "jsonpath={.metadata.labels.tier}"]
    expect: "frontend"
    description: "Deployment web has label tier=frontend"
  - args: ["get", "deploy", "api", "-o", "jsonpath={.metadata.labels.tier}"]
    expect: "backend"
    description: "Deployment api has label tier=backend"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: default
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: web
        template:
          metadata:
            labels:
              app: web
          spec:
            containers:
            - name: nginx
              image: nginx:1.25
