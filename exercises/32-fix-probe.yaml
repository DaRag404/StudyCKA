id: "32"
title: "Fix Liveness Probe"
difficulty: "hard"
category: "Workloads"
order: 32
description: |
  The Pod `probe-pod` keeps restarting.

  Fix the liveness probe.

hints:
  - "Check probe path"
validation:
  - args: ["get","pod","probe-pod","-o","jsonpath={.status.containerStatuses[0].restartCount}"]
    expect: "0"
    description: "No restarts"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: probe-pod
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          livenessProbe:
            httpGet:
              path: /wrong
              port: 80
