id: "19"
title: "Fix RBAC — Missing ClusterRoleBinding"
difficulty: "medium"
category: "Security"
order: 19
description: |
  A ServiceAccount named `dev-sa` needs to list Pods across the cluster.
  A ClusterRole `pod-reader` with the correct rules exists, but `dev-sa`
  is not bound to it.

  Create the missing ClusterRoleBinding.

  ```
  kubectl auth can-i list pods --as=system:serviceaccount:default:dev-sa
  kubectl get clusterrole pod-reader -o yaml
  ```
hints:
  - "Confirm access is denied: `kubectl auth can-i list pods --as=system:serviceaccount:default:dev-sa`"
  - "Create the binding: `kubectl create clusterrolebinding pod-reader-binding --clusterrole=pod-reader --serviceaccount=default:dev-sa`"
  - "Verify: `kubectl auth can-i list pods --as=system:serviceaccount:default:dev-sa` — should print `yes`"
validation:
  - args: ["get", "clusterrolebinding", "pod-reader-binding", "-o", "jsonpath={.roleRef.name}"]
    expect: "pod-reader"
    description: "ClusterRoleBinding references the pod-reader ClusterRole"
  - args: ["get", "clusterrolebinding", "pod-reader-binding", "-o", "jsonpath={.subjects[0].name}"]
    expect: "dev-sa"
    description: "Binding is attached to the dev-sa ServiceAccount"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: dev-sa
        namespace: default
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: pod-reader
      rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch"]
