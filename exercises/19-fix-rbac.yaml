id: "19"
title: "Fix: RBAC — Missing ClusterRoleBinding"
difficulty: "medium"
category: "Troubleshooting"
order: 19
description: |
  A ServiceAccount named `dev-sa` in the `default` namespace needs to **list and get Pods**
  across the cluster. A `ClusterRole` named `pod-reader` already exists with the right rules,
  but the ServiceAccount cannot use it yet.

  **Investigate:**
  ```
  kubectl auth can-i list pods --as=system:serviceaccount:default:dev-sa
  # Should print: no

  kubectl get clusterrole pod-reader -o yaml
  kubectl get clusterrolebinding | grep dev-sa
  ```

  **Fix:** Create a `ClusterRoleBinding` that binds `pod-reader` to `dev-sa`:
  ```
  kubectl create clusterrolebinding pod-reader-binding \
    --clusterrole=pod-reader \
    --serviceaccount=default:dev-sa
  ```

  **Verify:**
  ```
  kubectl auth can-i list pods --as=system:serviceaccount:default:dev-sa
  # Should print: yes
  ```
hints:
  - "`kubectl auth can-i` with `--as` is the fastest way to check effective permissions"
  - "A ClusterRoleBinding is cluster-scoped — it grants access across all namespaces"
  - "The subject for a ServiceAccount is `system:serviceaccount:<namespace>:<name>`"
validation:
  - args: ["get", "clusterrolebinding", "pod-reader-binding", "-o", "jsonpath={.roleRef.name}"]
    expect: "pod-reader"
    description: "ClusterRoleBinding references the pod-reader ClusterRole"
  - args: ["get", "clusterrolebinding", "pod-reader-binding", "-o", "jsonpath={.subjects[0].name}"]
    expect: "dev-sa"
    description: "Binding is attached to the dev-sa ServiceAccount"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: dev-sa
        namespace: default
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: pod-reader
      rules:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch"]
