id: "20"
title: "Fix Pod Stuck in Pending (Node Taint)"
difficulty: "medium"
category: "Troubleshooting"
order: 20
description: |
  A Pod named `pending-pod` is stuck in **Pending** state and cannot be scheduled.
  The node has a taint that the pod does not tolerate.

  Remove the taint so the pod can schedule.

  ```
  kubectl get pod pending-pod
  kubectl describe pod pending-pod
  ```
hints:
  - "Check the Events: `kubectl describe pod pending-pod` — look for 'untolerated taint'"
  - "Find the node and its taints: `kubectl describe node | grep -A5 Taints`"
  - "Remove the taint (add `-` suffix): `kubectl taint node cka-lab env=production:NoSchedule-`"
  - "Verify: `kubectl get pod pending-pod` — STATUS should change to `Running`"
validation:
  - args: ["get", "node", "-o", "jsonpath={.items[0].spec.taints}"]
    expect: ""
    description: "The env=production:NoSchedule taint has been removed"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: pending-pod
        namespace: default
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
  - type: command
    command: "kubectl taint nodes --all env=production:NoSchedule --overwrite"
