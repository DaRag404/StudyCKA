id: "36"
title: "Fix Multi-step App Stack"
difficulty: "hard"
category: "Troubleshooting"
order: 36
description: |
  A broken application stack is deployed with three problems:
  - The Deployment pods are crashing due to a wrong ConfigMap key reference
  - The Deployment selector label doesn't match the pod template labels
  - The Service selector doesn't match the pod labels

  Fix all three issues so pods are Running and the Service has endpoints.

  ```
  kubectl get pods
  kubectl get endpoints app-svc
  ```
hints:
  - "Start with the pods: `kubectl describe pod <name>` — look for ConfigMap key errors in Events"
  - "The ConfigMap has key `ENV` but the pod references key `WRONG` — fix the env reference"
  - "The Deployment `selector.matchLabels` and pod `template.labels` must match — both should use `app: app`"
  - "Fix the Service: `kubectl edit svc app-svc` — change the selector `app` value from `wrong` to `app`"
validation:
  - args: ["get", "svc", "app-svc", "-o", "jsonpath={.spec.selector.app}"]
    expect: "app"
    description: "Service selector matches pod labels"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
      data:
        ENV: production
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: wrong
        template:
          metadata:
            labels:
              app: wrong
          spec:
            containers:
            - name: app
              image: nginx:1.25
              env:
              - name: APP_ENV
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: WRONG
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: app-svc
      spec:
        selector:
          app: wrong
        ports:
        - port: 80
          targetPort: 80
