id: "17"
title: "Fix ImagePullBackOff (Image Typo)"
difficulty: "easy"
category: "Troubleshooting"
order: 17
description: |
  A Deployment named `web` has pods stuck in **ImagePullBackOff**. The image
  name contains a typo that prevents it from being pulled.

  Find the bad image and fix it. The correct image is `nginx:1.25`.

  ```
  kubectl get pods -l app=web
  kubectl describe pod <pod-name>
  ```
hints:
  - "Check the Events section: `kubectl describe pod <pod-name>` — look for the pull error"
  - "The image `ngnix:1.25` has a typo — `ngnix` should be `nginx`"
  - "Fix: `kubectl set image deployment/web nginx=nginx:1.25`"
  - "Verify: `kubectl rollout status deployment/web`"
validation:
  - args: ["get", "deployment", "web", "-o", "jsonpath={.spec.template.spec.containers[0].image}"]
    expect: "nginx:1.25"
    description: "Deployment uses the correct image nginx:1.25"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: default
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: web
        template:
          metadata:
            labels:
              app: web
          spec:
            containers:
            - name: nginx
              image: ngnix:1.25
