id: "31"
title: "Fix Secret Volume Mount"
difficulty: "hard"
category: "Security"
order: 31
description: |
  The Pod `secret-pod` cannot start due to a wrong Secret reference.

  Fix it.

hints:
  - "Check Secret name"
validation:
  - args: ["get","pod","secret-pod","-o","jsonpath={.status.phase}"]
    expect: "Running"
    description: "Pod is running"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: my-secret
      stringData:
        password: admin
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: secret-pod
      spec:
        containers:
        - name: app
          image: nginx:1.25
          volumeMounts:
          - name: secret-vol
            mountPath: "/etc/secret"
        volumes:
        - name: secret-vol
          secret:
            secretName: wrong-secret
