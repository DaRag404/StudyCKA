id: "18"
title: "Fix: Service Has No Endpoints"
difficulty: "medium"
category: "Troubleshooting"
order: 18
description: |
  A Service named `web-svc` exists in the `default` namespace but has **no endpoints** —
  traffic is not reaching the pods.

  **Investigate:**
  ```
  kubectl get endpoints web-svc
  kubectl get svc web-svc -o yaml
  kubectl get pods --show-labels
  ```

  Compare the Service's `selector` with the actual labels on the running pods.
  Find the mismatch and fix the Service selector to match the pods.

  **Fix:**
  ```
  kubectl patch svc web-svc -p '{"spec":{"selector":{"app":"<correct-value>"}}}'
  ```
  Or:
  ```
  kubectl edit svc web-svc
  ```

  **Verify:**
  ```
  kubectl get endpoints web-svc
  # Should show at least one IP address
  ```
hints:
  - "`kubectl get pods --show-labels` reveals what labels the pods actually have"
  - "`kubectl get svc web-svc -o jsonpath={.spec.selector}` shows the current (broken) selector"
  - "The selector key and value must exactly match a pod label — case-sensitive"
validation:
  - args: ["get", "svc", "web-svc", "-o", "jsonpath={.spec.selector.app}"]
    expect: "nginx"
    description: "Service selector correctly targets app=nginx pods"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nginx-deploy
        namespace: default
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: nginx
        template:
          metadata:
            labels:
              app: nginx
          spec:
            containers:
            - name: nginx
              image: nginx:1.25
              ports:
              - containerPort: 80
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: web-svc
        namespace: default
      spec:
        selector:
          app: web-app
        ports:
        - port: 80
          targetPort: 80
