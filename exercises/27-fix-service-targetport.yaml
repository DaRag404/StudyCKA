id: "27"
title: "Fix Service TargetPort Mismatch"
difficulty: "medium"
category: "Troubleshooting"
order: 27
description: |
  A Service named `web-svc` has endpoints but traffic is not reaching the Pod.
  The Service routes to the wrong container port.

  Fix the `targetPort` so traffic reaches nginx.

  ```
  kubectl get svc web-svc
  kubectl get endpoints web-svc
  ```
hints:
  - "Check the service port config: `kubectl get svc web-svc -o yaml` — look at `targetPort`"
  - "Check what port the container exposes: `kubectl get pod web -o jsonpath={.spec.containers[0].ports[0].containerPort}`"
  - "nginx listens on port `80`, but `targetPort` is `8080` — open `kubectl edit svc web-svc` and change `targetPort: 8080` to `targetPort: 80`"
  - "Verify the fix: `kubectl get endpoints web-svc` — the endpoint IP should now appear"
validation:
  - args: ["get", "svc", "web-svc", "-o", "jsonpath={.spec.ports[0].targetPort}"]
    expect: "80"
    description: "Service targetPort is 80"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: web
        labels:
          app: web
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          ports:
          - containerPort: 80
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: web-svc
      spec:
        selector:
          app: web
        ports:
        - port: 80
          targetPort: 8080
