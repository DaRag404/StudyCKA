id: "27"
title: "Fix Service TargetPort"
difficulty: "hard"
category: "Networking"
order: 27
description: |
  The Service `web-svc` does not route traffic correctly.

  Fix the configuration so traffic reaches the Pod.

hints:
  - "Check endpoints"
  - "Compare containerPort vs targetPort"
validation:
  - args: ["get","svc","web-svc","-o","jsonpath={.spec.ports[0].targetPort}"]
    expect: "80"
    description: "Correct targetPort"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: web
        labels:
          app: web
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          ports:
          - containerPort: 80
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: web-svc
      spec:
        selector:
          app: web
        ports:
        - port: 80
          targetPort: 8080
