id: "16"
title: "Fix CrashLoopBackOff"
difficulty: "medium"
category: "Troubleshooting"
order: 16
description: |
  A Pod named `broken-pod` is stuck in **CrashLoopBackOff**. The pod should
  run nginx and stay alive, but it keeps crashing immediately.

  Find the cause and fix it.

  ```
  kubectl get pod broken-pod
  kubectl logs broken-pod
  ```
hints:
  - "Check the logs: `kubectl logs broken-pod` — what is the exit message?"
  - "Inspect the spec: `kubectl get pod broken-pod -o yaml` — look at the `command` field"
  - "The `command` overrides the image entrypoint. Remove it so nginx uses its default startup"
  - "Export, fix, delete, re-apply: `kubectl get pod broken-pod -o yaml > fix.yaml` → edit → `kubectl delete pod broken-pod` → `kubectl apply -f fix.yaml`"
validation:
  - args: ["get", "pod", "broken-pod", "-o", "jsonpath={.spec.containers[0].image}"]
    expect: "nginx:1.25"
    description: "Pod still uses nginx:1.25"
  - args: ["get", "pod", "broken-pod", "-o", "jsonpath={.spec.containers[0].command}"]
    expect: ""
    description: "Broken command has been removed"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: broken-pod
        namespace: default
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          command: ["sh", "-c", "echo 'Starting...'; exit 1"]
