id: "45"
title: "Fix Service Selector Mismatch"
difficulty: "medium"
category: "Networking"
order: 45
description: |
  Service has no endpoints.

  Fix selector.

validation:
  - args: ["get","endpoints","svc","-o","jsonpath={.subsets}"]
    expect: "10.42"
    match: "contains"
    description: "Endpoints exist"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: web
        labels:
          app: web
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: svc
      spec:
        selector:
          app: wrong
        ports:
        - port: 80
          targetPort: 80
