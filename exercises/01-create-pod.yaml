id: "01"
title: "Create a Pod"
difficulty: "easy"
category: "Core Concepts"
order: 1
description: |
  Create a Pod named `nginx` in the `default` namespace using image `nginx:1.25`.

  ```
  kubectl get pod nginx
  ```
hints:
  - "Use the imperative command: `kubectl run nginx --image=nginx:1.25`"
  - "Check status: `kubectl get pod nginx` — wait for STATUS `Running`"
  - "Inspect details: `kubectl describe pod nginx`"
validation:
  - args: ["get", "pod", "nginx", "-o", "jsonpath={.spec.containers[0].image}"]
    expect: "nginx:1.25"
    description: "Pod uses image nginx:1.25"
  - args: ["get", "pod", "nginx", "-o", "jsonpath={.metadata.namespace}"]
    expect: "default"
    description: "Pod is in the default namespace"
preconditions: []
