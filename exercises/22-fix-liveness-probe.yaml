id: "22"
title: "Fix Pod Restarting Due to Liveness Probe"
difficulty: "medium"
category: "Troubleshooting"
order: 22
description: |
  A Pod named `probe-pod` keeps **restarting** — the restart count keeps climbing.
  The liveness probe is misconfigured.

  Find and fix the probe so restarts stop.

  ```
  kubectl get pod probe-pod
  kubectl describe pod probe-pod
  ```
hints:
  - "Check the Events: `kubectl describe pod probe-pod` — look for 'Liveness probe failed'"
  - "The probe is hitting port `9090`, but nginx only listens on port `80`"
  - "Export, fix, delete, re-apply: `kubectl get pod probe-pod -o yaml > fix.yaml` — change `port: 9090` to `port: 80`"
  - "After re-applying, watch `kubectl get pod probe-pod` — restarts should stabilise"
validation:
  - args: ["get", "pod", "probe-pod", "-o", "jsonpath={.spec.containers[0].livenessProbe.httpGet.port}"]
    expect: "80"
    description: "Liveness probe now targets port 80"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: probe-pod
        namespace: default
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          livenessProbe:
            httpGet:
              path: /
              port: 9090
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
