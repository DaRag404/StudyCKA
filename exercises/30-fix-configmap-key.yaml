id: "30"
title: "Fix Wrong ConfigMap Key Reference"
difficulty: "medium"
category: "Troubleshooting"
order: 30
description: |
  A Pod named `cm-pod` is failing because it references a key that does not
  exist in the ConfigMap. The pod cannot start.

  Fix the key reference so the pod runs successfully.

  ```
  kubectl get pod cm-pod
  kubectl describe pod cm-pod
  ```
hints:
  - "Check the error: `kubectl describe pod cm-pod` — look for 'couldn't find key' in Events"
  - "Inspect the ConfigMap: `kubectl get configmap app-config -o yaml` — note the actual key names"
  - "The pod references key `WRONG` but the ConfigMap has key `ENV`"
  - "Fix using the template at `/root/pod.yaml` — change `key: WRONG` to `key: ENV`, then delete and re-apply"
validation:
  - args: ["get", "pod", "cm-pod", "-o", "jsonpath={.status.phase}"]
    expect: "Running"
    description: "Pod cm-pod is Running"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
      data:
        ENV: production
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: cm-pod
      spec:
        containers:
        - name: app
          image: nginx:1.25
          env:
          - name: ENV
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: WRONG
  - type: file
    path: /root/pod.yaml
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: cm-pod
      spec:
        containers:
        - name: app
          image: nginx:1.25
          env:
          - name: ENV
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: WRONG
