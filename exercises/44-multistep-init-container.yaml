id: "44"
title: "Fix Init Container Volume Name Mismatch"
difficulty: "hard"
category: "Workloads"
order: 44
description: |
  A Pod named `init-pod` has an init container that should write a file to a
  shared volume, which the main nginx container then serves. The pod starts but
  nginx serves the default page instead of the init container's content.

  Find and fix the volume name mismatch.

  ```
  kubectl get pod init-pod
  kubectl describe pod init-pod
  ```
hints:
  - "Inspect the pod spec: `kubectl get pod init-pod -o yaml` — compare `volumeMounts.name` across containers"
  - "The init container mounts volume named `wrong` but the actual volume is named `data`"
  - "Both the init container and the main container must reference the same volume name"
  - "Export, fix, delete, re-apply: change the init container `volumeMounts[0].name` from `wrong` to `data`"
validation:
  - args: ["get", "pod", "init-pod", "-o", "jsonpath={.spec.volumes[0].name}"]
    expect: "data"
    description: "Pod volume is correctly named data"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: init-pod
      spec:
        initContainers:
        - name: init
          image: busybox:1.35
          command: ["sh", "-c", "echo hello > /data/index.html"]
          volumeMounts:
          - name: wrong
            mountPath: /data
        containers:
        - name: nginx
          image: nginx:1.25
          volumeMounts:
          - name: data
            mountPath: /usr/share/nginx/html
        volumes:
        - name: data
          emptyDir: {}
