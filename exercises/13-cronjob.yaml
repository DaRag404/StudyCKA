id: "13"
title: "Create a CronJob"
difficulty: "medium"
category: "Workloads"
order: 13
description: |
  Create a CronJob named `hello` that runs every minute, using image `busybox:1.35`
  to execute: `date; echo Hello from CronJob`.

  A CronJob manages time-based Jobs, similar to cron in Linux. The schedule uses
  standard cron syntax: `minute hour day-of-month month day-of-week`.

  A template has been placed at `/root/cronjob.yaml`. Fill in the schedule and command, then apply it:
  ```
  kubectl apply -f /root/cronjob.yaml
  ```

  **Verify:**
  ```
  kubectl get cronjob hello
  # Wait ~1 minute then:
  kubectl get jobs
  kubectl logs -l job-name=<auto-generated-name>
  ```
hints:
  - "`*/1 * * * *` means \"every 1 minute\". The CKA exam often asks for this exact schedule"
  - "`kubectl create cronjob hello --image=busybox:1.35 --schedule='*/1 * * * *' -- /bin/sh -c 'date'`"
  - "Use `successfulJobsHistoryLimit` and `failedJobsHistoryLimit` to control job retention"
validation:
  - args: ["get", "cronjob", "hello", "-o", "jsonpath={.spec.schedule}"]
    expect: "*/1 * * * *"
    description: "CronJob schedule is */1 * * * *"
  - args: ["get", "cronjob", "hello", "-o", "jsonpath={.spec.jobTemplate.spec.template.spec.containers[0].image}"]
    expect: "busybox:1.35"
    description: "CronJob uses busybox:1.35"
preconditions:
  - type: file
    path: /root/cronjob.yaml
    content: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: hello
      spec:
        schedule: "<cron-schedule>"
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                - name: hello
                  image: busybox:1.35
                  command:
                  - /bin/sh
                  - -c
                  - <command>
