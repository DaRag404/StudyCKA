id: "28"
title: "Fix Invalid Image"
difficulty: "hard"
category: "Workloads"
order: 28
description: |
  The Pod `bad-image` is not starting due to an invalid image.

  Fix the image so the Pod runs.

hints:
  - "Describe the Pod"
validation:
  - args: ["get","pod","bad-image","-o","jsonpath={.status.phase}"]
    expect: "Running"
    description: "Pod is running"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: bad-image
      spec:
        containers:
        - name: app
          image: nginx:doesnotexist
