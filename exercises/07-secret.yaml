id: "07"
title: "Create a Secret"
difficulty: "medium"
category: "Configuration"
order: 7
description: |
  Create a Secret named `db-secret` in the `default` namespace with the key `password`
  and value `mysecretpassword`.

  Then create a Pod named `db-client` using image `nginx:1.25` that mounts this secret
  as an environment variable named `DB_PASSWORD`.

  **Step 1 — Create the Secret:**
  ```
  kubectl create secret generic db-secret --from-literal=password=mysecretpassword
  ```

  **Step 2 — Create the Pod:**

  A template has been placed at `/root/pod.yaml`. Fill in the missing fields and apply it:
  ```
  kubectl apply -f /root/pod.yaml
  ```

  **Verify:**
  ```
  kubectl get secret db-secret
  kubectl exec db-client -- env | grep DB_PASSWORD
  ```
hints:
  - "Secret values are base64-encoded automatically when using `kubectl create secret`"
  - "`kubectl get secret db-secret -o jsonpath={.data.password} | base64 -d` decodes the value"
  - "Secrets can also be mounted as files into a volume"
validation:
  - args: ["get", "secret", "db-secret", "-o", "jsonpath={.type}"]
    expect: "Opaque"
    description: "Secret db-secret exists and is of type Opaque"
  - args: ["get", "pod", "db-client", "-o", "jsonpath={.spec.containers[0].env[0].valueFrom.secretKeyRef.name}"]
    expect: "db-secret"
    description: "Pod db-client references db-secret"
preconditions:
  - type: file
    path: /root/pod.yaml
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: db-client
      spec:
        containers:
        - name: client
          image: nginx:1.25
          env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: <secret-name>
                key: <key>
