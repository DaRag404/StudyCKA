id: "04"
title: "Expose a Deployment as a Service"
difficulty: "easy"
category: "Services & Networking"
order: 4
description: |
  A Deployment named `web` is running. Expose it as a **ClusterIP** Service named `web`
  on port **80**, targeting container port **80**.

  ```
  kubectl get svc web
  kubectl get endpoints web
  ```
hints:
  - "Use: `kubectl expose deployment web --port=80 --target-port=80`"
  - "ClusterIP is the default type — no need to specify `--type=ClusterIP`"
  - "Check traffic routing: `kubectl get endpoints web` — should show pod IPs"
validation:
  - args: ["get", "svc", "web", "-o", "jsonpath={.spec.type}"]
    expect: "ClusterIP"
    description: "Service type is ClusterIP"
  - args: ["get", "svc", "web", "-o", "jsonpath={.spec.ports[0].port}"]
    expect: "80"
    description: "Service listens on port 80"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: default
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: web
        template:
          metadata:
            labels:
              app: web
          spec:
            containers:
            - name: nginx
              image: nginx:1.25
              ports:
              - containerPort: 80
