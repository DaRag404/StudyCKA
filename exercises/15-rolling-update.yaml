id: "15"
title: "Rolling Update and Rollout"
difficulty: "medium"
category: "Workloads"
order: 15
description: |
  A Deployment named `web` is running `nginx:1.24`. Update it to `nginx:1.25`
  and configure the rolling update strategy: `maxSurge: 1`, `maxUnavailable: 0`.

  ```
  kubectl get deployment web
  kubectl rollout status deployment/web
  kubectl rollout history deployment/web
  ```
hints:
  - "Update the image: `kubectl set image deployment/web nginx=nginx:1.25`"
  - "Edit the strategy: `kubectl edit deployment web` — under `spec.strategy`, set `type: RollingUpdate` and add `rollingUpdate: {maxSurge: 1, maxUnavailable: 0}`"
  - "Monitor: `kubectl rollout status deployment/web`"
  - "To undo if needed: `kubectl rollout undo deployment/web`"
validation:
  - args: ["get", "deploy", "web", "-o", "jsonpath={.spec.template.spec.containers[0].image}"]
    expect: "nginx:1.25"
    description: "Deployment uses updated image nginx:1.25"
  - args: ["get", "deploy", "web", "-o", "jsonpath={.spec.strategy.rollingUpdate.maxUnavailable}"]
    expect: "0"
    description: "maxUnavailable is 0"
  - args: ["get", "deploy", "web", "-o", "jsonpath={.spec.strategy.rollingUpdate.maxSurge}"]
    expect: "1"
    description: "maxSurge is 1"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: web
        namespace: default
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: web
        template:
          metadata:
            labels:
              app: web
          spec:
            containers:
            - name: nginx
              image: nginx:1.24
