id: "38"
title: "Fix PV + PVC + Pod Binding Chain"
difficulty: "hard"
category: "Troubleshooting"
order: 38
description: |
  A storage chain is broken:
  - A PersistentVolume `pv` and PersistentVolumeClaim `claim` are not binding
  - A Pod `pvc-pod` cannot start because the PVC is not bound

  Fix the access mode mismatch so the PVC binds and the Pod starts.

  ```
  kubectl get pv,pvc
  kubectl get pod pvc-pod
  ```
hints:
  - "Compare the PV and PVC: `kubectl get pv pv -o jsonpath={.spec.accessModes}` and `kubectl get pvc claim -o jsonpath={.spec.accessModes}`"
  - "The PV supports `ReadWriteOnce` but the PVC requests `ReadOnlyMany` — they must match to bind"
  - "`accessModes` is immutable — delete the PVC and recreate it with `ReadWriteOnce`"
  - "Once the PVC is Bound, the pod will start automatically: `kubectl get pod pvc-pod`"
validation:
  - args: ["get", "pvc", "claim", "-o", "jsonpath={.status.phase}"]
    expect: "Bound"
    description: "PVC claim is Bound to the PV"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: pv
      spec:
        capacity:
          storage: 1Gi
        accessModes:
        - ReadWriteOnce
        hostPath:
          path: /data
      ---
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: claim
      spec:
        accessModes:
        - ReadOnlyMany
        resources:
          requests:
            storage: 1Gi
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: pvc-pod
      spec:
        containers:
        - name: app
          image: nginx:1.25
          volumeMounts:
          - mountPath: "/data"
            name: vol
        volumes:
        - name: vol
          persistentVolumeClaim:
            claimName: claim
