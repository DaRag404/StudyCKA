id: "24"
title: "Fix: Pod Using Wrong ServiceAccount"
difficulty: "hard"
category: "Troubleshooting"
order: 24
description: |
  A Pod named `api-pod` needs to **list ConfigMaps** in the `default` namespace.
  A ServiceAccount `api-sa` and a Role `configmap-reader` with the right permissions already exist.

  However the pod is using the `default` ServiceAccount which has no permissions.

  **Investigate:**
  ```
  kubectl get pod api-pod -o jsonpath='{.spec.serviceAccountName}'
  kubectl auth can-i list configmaps --as=system:serviceaccount:default:default
  kubectl auth can-i list configmaps --as=system:serviceaccount:default:api-sa
  ```

  **Fix:** Recreate the pod so it uses `api-sa` instead of `default`:
  ```
  kubectl get pod api-pod -o yaml > api-pod.yaml
  # Edit: spec.serviceAccountName: api-sa
  kubectl delete pod api-pod
  kubectl apply -f api-pod.yaml
  ```

  **Verify:**
  ```
  kubectl get pod api-pod -o jsonpath='{.spec.serviceAccountName}'
  # → api-sa
  kubectl auth can-i list configmaps \
    --as=system:serviceaccount:default:api-sa
  # → yes
  ```
hints:
  - "`spec.serviceAccountName` is immutable — delete and recreate the pod to change it"
  - "Check the RoleBinding exists: `kubectl get rolebinding -n default`"
  - "`kubectl auth can-i` lets you impersonate any ServiceAccount to test permissions"
validation:
  - args: ["get", "pod", "api-pod", "-o", "jsonpath={.spec.serviceAccountName}"]
    expect: "api-sa"
    description: "Pod is now using the api-sa ServiceAccount"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: api-sa
        namespace: default
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: configmap-reader
        namespace: default
      rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: configmap-reader-binding
        namespace: default
      subjects:
      - kind: ServiceAccount
        name: api-sa
        namespace: default
      roleRef:
        kind: Role
        name: configmap-reader
        apiGroup: rbac.authorization.k8s.io
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: api-pod
        namespace: default
      spec:
        serviceAccountName: default
        containers:
        - name: app
          image: nginx:1.25
