id: "23"
title: "Fix OOMKilled — Memory Limit Too Low"
difficulty: "medium"
category: "Troubleshooting"
order: 23
description: |
  A Pod named `memory-pod` keeps crashing with status **OOMKilled**. The memory
  limit is set too low for nginx to run.

  Increase the memory limit to `64Mi` and the request to `32Mi`.

  ```
  kubectl get pod memory-pod
  kubectl describe pod memory-pod
  ```
hints:
  - "Check the Last State: `kubectl describe pod memory-pod` — look for `Reason: OOMKilled`"
  - "The current limit is only `4Mi` — far too low for nginx"
  - "Export, fix, delete, re-apply: change `resources.requests.memory: 32Mi` and `resources.limits.memory: 64Mi`"
  - "Verify: `kubectl get pod memory-pod` — should be `Running` without restarts"
validation:
  - args: ["get", "pod", "memory-pod", "-o", "jsonpath={.spec.containers[0].resources.limits.memory}"]
    expect: "64Mi"
    description: "Memory limit increased to 64Mi"
  - args: ["get", "pod", "memory-pod", "-o", "jsonpath={.spec.containers[0].resources.requests.memory}"]
    expect: "32Mi"
    description: "Memory request set to 32Mi"
preconditions:
  - type: manifest
    manifest: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: memory-pod
        namespace: default
      spec:
        containers:
        - name: nginx
          image: nginx:1.25
          resources:
            requests:
              memory: "2Mi"
            limits:
              memory: "4Mi"
